<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hudson Agent Visualizer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    color: #c9d1d9;
    overflow: hidden;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 2px solid #30363d;
    border-radius: 8px;
  }
  #status {
    margin-top: 16px;
    font-size: 14px;
    color: #8b949e;
    text-align: center;
    min-height: 40px;
  }
  #status .tool { color: #58a6ff; }
  #status .msg { color: #3fb950; }
  #status .thinking { color: #d29922; }
  h1 {
    font-size: 18px;
    margin-bottom: 12px;
    color: #58a6ff;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<h1>HUDSON AGENT MONITOR</h1>
<canvas id="c" width="640" height="400"></canvas>
<div id="status">Waiting for agent activity...</div>

<script>
// ============================================================
//  PIXEL ART SPRITES — defined as 2D color arrays
// ============================================================

// Colors
const SKIN = '#FFDAB9';
const HAIR = '#4A3728';
const SHIRT = '#3B82F6';
const PANTS = '#1E3A5F';
const SHOE = '#2D2D2D';
const DESK = '#8B6914';
const DESK_TOP = '#A0801A';
const MONITOR = '#1a1a2e';
const SCREEN_ON = '#3fb950';
const SCREEN_OFF = '#21262d';
const CHAIR = '#4A4A5A';
const FLOOR1 = '#1B2028';
const FLOOR2 = '#1E2430';
const WALL = '#21262d';
const WALL_TOP = '#30363d';
const PLANT_POT = '#8B5E3C';
const PLANT = '#2EA043';
const BOOK1 = '#E06060';
const BOOK2 = '#6088E0';
const BOOK3 = '#60C060';
const SHELF = '#6E4B1E';
const BUB_BG = '#ffffff';
const BUB_BORDER = '#555566';
const BUB_GREEN = '#3fb950';
const BUB_AMBER = '#d29922';

const T = '';  // transparent

// Hudson character — front facing, sitting (12x16)
const CHAR_SIT_0 = [
  [T,T,T,T,HAIR,HAIR,HAIR,HAIR,T,T,T,T],
  [T,T,T,HAIR,HAIR,HAIR,HAIR,HAIR,HAIR,T,T,T],
  [T,T,T,HAIR,HAIR,HAIR,HAIR,HAIR,HAIR,T,T,T],
  [T,T,T,SKIN,SKIN,SKIN,SKIN,SKIN,SKIN,T,T,T],
  [T,T,T,SKIN,'#222',SKIN,SKIN,'#222',SKIN,T,T,T],
  [T,T,T,SKIN,SKIN,SKIN,SKIN,SKIN,SKIN,T,T,T],
  [T,T,T,T,SKIN,SKIN,SKIN,SKIN,T,T,T,T],
  [T,T,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,T,T],
  [T,SKIN,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SKIN,T],
  [T,SKIN,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SKIN,T],
  [T,T,SKIN,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SKIN,T,T],
  [T,T,T,PANTS,PANTS,PANTS,PANTS,PANTS,PANTS,T,T,T],
  [T,T,PANTS,PANTS,PANTS,T,T,PANTS,PANTS,PANTS,T,T],
  [T,T,PANTS,PANTS,PANTS,T,T,PANTS,PANTS,PANTS,T,T],
];

// Typing frame — arms extended
const CHAR_SIT_1 = [
  [T,T,T,T,HAIR,HAIR,HAIR,HAIR,T,T,T,T],
  [T,T,T,HAIR,HAIR,HAIR,HAIR,HAIR,HAIR,T,T,T],
  [T,T,T,HAIR,HAIR,HAIR,HAIR,HAIR,HAIR,T,T,T],
  [T,T,T,SKIN,SKIN,SKIN,SKIN,SKIN,SKIN,T,T,T],
  [T,T,T,SKIN,'#222',SKIN,SKIN,'#222',SKIN,T,T,T],
  [T,T,T,SKIN,SKIN,SKIN,SKIN,SKIN,SKIN,T,T,T],
  [T,T,T,T,SKIN,SKIN,SKIN,SKIN,T,T,T,T],
  [T,T,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,T,T],
  [SKIN,SKIN,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SKIN,SKIN],
  [T,SKIN,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SKIN,T],
  [T,T,SKIN,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SKIN,T,T],
  [T,T,T,PANTS,PANTS,PANTS,PANTS,PANTS,PANTS,T,T,T],
  [T,T,PANTS,PANTS,PANTS,T,T,PANTS,PANTS,PANTS,T,T],
  [T,T,PANTS,PANTS,PANTS,T,T,PANTS,PANTS,PANTS,T,T],
];

// Reading frame — hand up
const CHAR_READ = [
  [T,T,T,T,HAIR,HAIR,HAIR,HAIR,T,T,T,T],
  [T,T,T,HAIR,HAIR,HAIR,HAIR,HAIR,HAIR,T,T,T],
  [T,T,T,HAIR,HAIR,HAIR,HAIR,HAIR,HAIR,T,T,T],
  [T,T,T,SKIN,SKIN,SKIN,SKIN,SKIN,SKIN,T,T,T],
  [T,T,T,SKIN,'#222',SKIN,SKIN,'#222',SKIN,T,T,T],
  [T,T,T,T,SKIN,SKIN,SKIN,SKIN,T,T,T,T],
  [T,T,T,T,SKIN,SKIN,SKIN,SKIN,T,T,T,T],
  [T,T,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,T,T],
  [T,SKIN,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,T,T],
  [T,SKIN,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SKIN,T],
  [T,T,T,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SKIN,SKIN,T],
  [T,T,T,PANTS,PANTS,PANTS,PANTS,PANTS,PANTS,T,T,T],
  [T,T,PANTS,PANTS,PANTS,T,T,PANTS,PANTS,PANTS,T,T],
  [T,T,PANTS,PANTS,PANTS,T,T,PANTS,PANTS,PANTS,T,T],
];

// Standing idle frame (16 tall)
const CHAR_STAND = [
  [T,T,T,T,HAIR,HAIR,HAIR,HAIR,T,T,T,T],
  [T,T,T,HAIR,HAIR,HAIR,HAIR,HAIR,HAIR,T,T,T],
  [T,T,T,HAIR,HAIR,HAIR,HAIR,HAIR,HAIR,T,T,T],
  [T,T,T,SKIN,SKIN,SKIN,SKIN,SKIN,SKIN,T,T,T],
  [T,T,T,SKIN,'#222',SKIN,SKIN,'#222',SKIN,T,T,T],
  [T,T,T,SKIN,SKIN,SKIN,SKIN,SKIN,SKIN,T,T,T],
  [T,T,T,T,SKIN,SKIN,SKIN,SKIN,T,T,T,T],
  [T,T,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,T,T],
  [T,T,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,T,T],
  [T,SKIN,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SKIN,T],
  [T,T,SKIN,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SHIRT,SKIN,T,T],
  [T,T,T,PANTS,PANTS,PANTS,PANTS,PANTS,PANTS,T,T,T],
  [T,T,T,PANTS,PANTS,PANTS,PANTS,PANTS,PANTS,T,T,T],
  [T,T,T,PANTS,PANTS,T,T,PANTS,PANTS,T,T,T],
  [T,T,T,SHOE,SHOE,T,T,SHOE,SHOE,T,T,T],
  [T,T,T,SHOE,SHOE,T,T,SHOE,SHOE,T,T,T],
];

// ============================================================
//  CONSTANTS
// ============================================================
const ZOOM = 4;
const TILE = 16;
const COLS = 20;
const ROWS = 12;
const W = COLS * TILE * ZOOM;
const H = ROWS * TILE * ZOOM;

// Character position (tile coords) — desk is at col 8-10, row 4
const DESK_COL = 8;
const DESK_ROW = 4;
const CHAR_COL = 9;    // character sits in front of desk
const CHAR_ROW = 5;

// ============================================================
//  CANVAS SETUP
// ============================================================
const canvas = document.getElementById('c');
canvas.width = W;
canvas.height = H;
canvas.style.width = (W / 2) + 'px';   // CSS half size for sharpness
canvas.style.height = (H / 2) + 'px';
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const statusEl = document.getElementById('status');

// ============================================================
//  STATE
// ============================================================
let agentState = 'idle';  // idle, typing, reading, thinking
let currentTool = '';
let bubbleType = 'none';  // none, thinking, done, tool
let bubbleText = '';
let animFrame = 0;
let animTimer = 0;
let screenOn = false;
let lastEventIdx = 0;
let idleTimer = 0;
let breathFrame = 0;

// ============================================================
//  SPRITE RENDERER
// ============================================================
function drawSprite(sprite, x, y, zoom) {
  for (let row = 0; row < sprite.length; row++) {
    for (let col = 0; col < sprite[row].length; col++) {
      const color = sprite[row][col];
      if (color === T) continue;
      ctx.fillStyle = color;
      ctx.fillRect(x + col * zoom, y + row * zoom, zoom, zoom);
    }
  }
}

// ============================================================
//  ROOM RENDERER
// ============================================================
function drawRoom() {
  // Floor
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      ctx.fillStyle = (r + c) % 2 === 0 ? FLOOR1 : FLOOR2;
      ctx.fillRect(c * TILE * ZOOM, r * TILE * ZOOM, TILE * ZOOM, TILE * ZOOM);
    }
  }

  // Back wall
  ctx.fillStyle = WALL;
  ctx.fillRect(0, 0, W, 2 * TILE * ZOOM);
  ctx.fillStyle = WALL_TOP;
  ctx.fillRect(0, 0, W, 4 * ZOOM);

  // Wall line
  ctx.fillStyle = '#30363d';
  ctx.fillRect(0, 2 * TILE * ZOOM - ZOOM, W, ZOOM);

  // Bookshelf on wall (cols 2-4, row 1)
  const bx = 2 * TILE * ZOOM;
  const by = 0.5 * TILE * ZOOM;
  // Shelf frame
  ctx.fillStyle = SHELF;
  ctx.fillRect(bx, by, 3 * TILE * ZOOM, 1.3 * TILE * ZOOM);
  ctx.fillStyle = '#5A3D14';
  ctx.fillRect(bx + ZOOM, by + ZOOM, 3 * TILE * ZOOM - 2*ZOOM, 1.3 * TILE * ZOOM - 2*ZOOM);
  // Books
  const books = [BOOK1, BOOK2, BOOK3, BOOK1, BOOK2, BOOK3, BOOK1, BOOK2];
  for (let i = 0; i < books.length; i++) {
    ctx.fillStyle = books[i];
    ctx.fillRect(bx + 4*ZOOM + i * 5*ZOOM, by + 3*ZOOM, 4*ZOOM, 12*ZOOM);
  }
  // Shelf divider
  ctx.fillStyle = SHELF;
  ctx.fillRect(bx, by + 16*ZOOM, 3 * TILE * ZOOM, 2*ZOOM);

  // Plant (col 16, row 2)
  const px = 16 * TILE * ZOOM;
  const py = 2.2 * TILE * ZOOM;
  ctx.fillStyle = PLANT_POT;
  ctx.fillRect(px + 4*ZOOM, py + 8*ZOOM, 8*ZOOM, 8*ZOOM);
  ctx.fillStyle = PLANT;
  ctx.fillRect(px + 2*ZOOM, py, 4*ZOOM, 10*ZOOM);
  ctx.fillRect(px + 7*ZOOM, py - 2*ZOOM, 4*ZOOM, 12*ZOOM);
  ctx.fillRect(px + 4*ZOOM, py + 2*ZOOM, 8*ZOOM, 6*ZOOM);

  // Desk
  const dx = DESK_COL * TILE * ZOOM;
  const dy = DESK_ROW * TILE * ZOOM;
  // Desk top surface
  ctx.fillStyle = DESK_TOP;
  ctx.fillRect(dx - 4*ZOOM, dy, 3 * TILE * ZOOM + 8*ZOOM, 4*ZOOM);
  // Desk body
  ctx.fillStyle = DESK;
  ctx.fillRect(dx, dy + 4*ZOOM, 3 * TILE * ZOOM, TILE * ZOOM - 4*ZOOM);
  // Desk legs
  ctx.fillStyle = '#6E4B1E';
  ctx.fillRect(dx + 2*ZOOM, dy + TILE*ZOOM, 3*ZOOM, 6*ZOOM);
  ctx.fillRect(dx + 3*TILE*ZOOM - 5*ZOOM, dy + TILE*ZOOM, 3*ZOOM, 6*ZOOM);

  // Monitor on desk
  const mx = (DESK_COL + 1) * TILE * ZOOM;
  const my = dy - 10 * ZOOM;
  ctx.fillStyle = MONITOR;
  ctx.fillRect(mx, my, TILE * ZOOM, 12 * ZOOM);
  ctx.fillStyle = screenOn ? SCREEN_ON : SCREEN_OFF;
  ctx.fillRect(mx + ZOOM, my + ZOOM, TILE * ZOOM - 2*ZOOM, 10*ZOOM);
  // Monitor stand
  ctx.fillStyle = '#333';
  ctx.fillRect(mx + 6*ZOOM, my + 12*ZOOM, 4*ZOOM, 3*ZOOM);
  ctx.fillRect(mx + 4*ZOOM, my + 14*ZOOM, 8*ZOOM, 2*ZOOM);

  // Screen content when on
  if (screenOn) {
    ctx.fillStyle = '#0d1117';
    ctx.fillRect(mx + 2*ZOOM, my + 2*ZOOM, TILE*ZOOM - 4*ZOOM, 8*ZOOM);
    // Fake text lines
    const colors = ['#58a6ff', '#3fb950', '#d29922', '#c9d1d9'];
    for (let i = 0; i < 4; i++) {
      ctx.fillStyle = colors[i];
      const lineW = (6 + Math.sin(Date.now()/400 + i*2) * 3) * ZOOM;
      ctx.fillRect(mx + 3*ZOOM, my + 3*ZOOM + i*2*ZOOM, lineW, ZOOM);
    }
  }

  // Chair (in front of desk)
  const cx = CHAR_COL * TILE * ZOOM;
  const cy = CHAR_ROW * TILE * ZOOM + 8*ZOOM;
  ctx.fillStyle = CHAIR;
  // Seat
  ctx.fillRect(cx + ZOOM, cy + 6*ZOOM, 10*ZOOM, 4*ZOOM);
  // Back
  ctx.fillRect(cx + ZOOM, cy - 2*ZOOM, 2*ZOOM, 8*ZOOM);
  ctx.fillRect(cx + 9*ZOOM, cy - 2*ZOOM, 2*ZOOM, 8*ZOOM);
  ctx.fillRect(cx + ZOOM, cy - 2*ZOOM, 10*ZOOM, 2*ZOOM);
  // Legs
  ctx.fillStyle = '#333';
  ctx.fillRect(cx + 2*ZOOM, cy + 10*ZOOM, 2*ZOOM, 4*ZOOM);
  ctx.fillRect(cx + 8*ZOOM, cy + 10*ZOOM, 2*ZOOM, 4*ZOOM);
}

// ============================================================
//  SPEECH BUBBLE RENDERER
// ============================================================
function drawBubble(x, y, type, text) {
  if (type === 'none') return;

  ctx.save();
  const bw = Math.max(text.length * 5 * ZOOM + 8*ZOOM, 20*ZOOM);
  const bh = 10 * ZOOM;
  const bx = x - bw/2 + 6*ZOOM;
  const by = y - bh - 6*ZOOM;

  // Background
  ctx.fillStyle = BUB_BG;
  ctx.fillRect(bx, by, bw, bh);
  // Border
  ctx.strokeStyle = BUB_BORDER;
  ctx.lineWidth = ZOOM;
  ctx.strokeRect(bx, by, bw, bh);
  // Tail
  ctx.fillStyle = BUB_BG;
  ctx.fillRect(bx + bw/2 - 2*ZOOM, by + bh, 4*ZOOM, 3*ZOOM);

  // Icon
  let iconColor = BUB_GREEN;
  let icon = '✓';
  if (type === 'thinking') { iconColor = BUB_AMBER; icon = '◆'; }
  if (type === 'tool')     { iconColor = '#58a6ff'; icon = '⚡'; }

  ctx.fillStyle = iconColor;
  ctx.font = `${3*ZOOM}px monospace`;
  ctx.fillText(icon, bx + 2*ZOOM, by + bh - 3*ZOOM);

  // Text
  ctx.fillStyle = '#1a1a2e';
  ctx.font = `${2.5*ZOOM}px monospace`;
  ctx.fillText(text, bx + 6*ZOOM, by + bh - 3*ZOOM);
  ctx.restore();
}

// ============================================================
//  CHARACTER RENDERER
// ============================================================
function drawCharacter() {
  const x = CHAR_COL * TILE * ZOOM;
  const y = CHAR_ROW * TILE * ZOOM - 10*ZOOM;

  let sprite;
  if (agentState === 'idle') {
    sprite = CHAR_STAND;
    // Subtle breathing — shift y by 1 pixel
    const breathOffset = Math.sin(Date.now() / 800) > 0.3 ? ZOOM : 0;
    drawSprite(sprite, x, y - 4*ZOOM + breathOffset, ZOOM);
  } else if (agentState === 'typing') {
    sprite = animFrame % 2 === 0 ? CHAR_SIT_0 : CHAR_SIT_1;
    drawSprite(sprite, x, y, ZOOM);
  } else if (agentState === 'reading' || agentState === 'thinking') {
    sprite = CHAR_READ;
    drawSprite(sprite, x, y, ZOOM);
  }

  // Bubble
  drawBubble(x, y, bubbleType, bubbleText);
}

// ============================================================
//  GAME LOOP
// ============================================================
let lastTime = 0;

function gameLoop(timestamp) {
  const dt = (timestamp - lastTime) / 1000;
  lastTime = timestamp;

  // Animation timer
  animTimer += dt;
  if (agentState === 'typing' && animTimer > 0.3) {
    animFrame = (animFrame + 1) % 4;
    animTimer = 0;
  }
  if (agentState === 'reading' && animTimer > 0.5) {
    animFrame = (animFrame + 1) % 2;
    animTimer = 0;
  }

  // Screen follows state
  screenOn = (agentState !== 'idle');

  // Draw
  ctx.clearRect(0, 0, W, H);
  drawRoom();
  drawCharacter();

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);

// ============================================================
//  EVENT POLLING — reads trace.jsonl
// ============================================================
async function pollTrace() {
  try {
    const resp = await fetch('/trace.jsonl?t=' + Date.now());
    if (!resp.ok) return;
    const text = await resp.text();
    const lines = text.trim().split('\n').filter(Boolean);

    // Process only new events
    for (let i = lastEventIdx; i < lines.length; i++) {
      try {
        const event = JSON.parse(lines[i]);
        handleEvent(event);
      } catch (e) {}
    }
    lastEventIdx = lines.length;
  } catch (e) {}
}

function handleEvent(event) {
  switch (event.type) {
    case 'user_message':
      agentState = 'thinking';
      bubbleType = 'thinking';
      bubbleText = 'Thinking...';
      statusEl.innerHTML = `<span class="msg">User:</span> ${escHtml(event.message)}`;
      break;

    case 'tool_start':
      agentState = 'typing';
      bubbleType = 'tool';
      const toolLabel = {
        'search_books': 'Searching books',
        'web_search': 'Searching web',
        'search_movies': 'Searching movies',
        'get_movie_details': 'Getting movie info',
      }[event.tool] || event.tool;
      bubbleText = toolLabel;
      currentTool = event.tool;
      statusEl.innerHTML = `<span class="tool">Tool: ${escHtml(event.tool)}</span> ${escHtml(JSON.stringify(event.args))}`;
      break;

    case 'tool_done':
      agentState = 'reading';
      bubbleType = 'thinking';
      bubbleText = 'Processing...';
      break;

    case 'thinking':
      agentState = 'thinking';
      bubbleType = 'thinking';
      bubbleText = 'Thinking...';
      break;

    case 'answer':
      agentState = 'idle';
      bubbleType = 'none';
      bubbleText = '';
      statusEl.innerHTML = `<span class="msg">Hudson answered</span> (${escHtml(event.text)}...)`;
      // Show done bubble briefly
      bubbleType = 'done';
      bubbleText = 'Done!';
      setTimeout(() => { bubbleType = 'none'; bubbleText = ''; }, 3000);
      break;

    case 'idle':
      agentState = 'idle';
      bubbleType = 'none';
      bubbleText = '';
      statusEl.innerHTML = 'Waiting for agent activity...';
      break;
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Poll every 300ms
setInterval(pollTrace, 300);
</script>
</body>
</html>
